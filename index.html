<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <!-- Header -->
        <header class="header">
            <h1>📋 Group Task Manager</h1>
            <p class="subtitle">Organize and track your team's tasks</p>
        </header>


        <!-- Task Input Section -->
        <section class="task-input-section">
            <form id="task-form">

                <div class="input-group">
                    <input 
                        type="text" 
                        id="task-input" 
                        placeholder="✏️ Enter a new task..."
                        required
                    >
                </div>

                <div class="input-group">
                    <label for="due-date-input">Due Date</label>
                    <input 
                        type="date" 
                        id="due-date-input"
                    >
                </div>

                <button type="submit" class="add-btn">
                    ➕ Add Task
                </button>

            </form>
        </section>


        <!-- Task Statistics -->
        <section class="task-stats">
            <div class="stats-box">
                <span id="task-count">0</span>
                <p>Total Tasks</p>
            </div>
        </section>

        <!-- Search & Filter Section -->
        <section class="search-filter-section">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input
                    type="text"
                    id="search-input"
                    placeholder="Search tasks..."
                >
                <button type="button" id="clear-search" class="clear-btn" title="Clear search">✕</button>
            </div>
 
            <div class="filter-group">
                <button type="button" class="filter-btn active" data-filter="all">All</button>
                <button type="button" class="filter-btn" data-filter="overdue">🔴 Overdue</button>
                <button type="button" class="filter-btn" data-filter="upcoming">🟡 Upcoming</button>
                <button type="button" class="filter-btn" data-filter="no-date">⚪ No Date</button>
            </div>
        </section>

        <!-- Task List -->
        <section class="task-list-section">
            <ul id="task-list"></ul>
            <p id="empty-message" class="empty-message" style="display:none;">No tasks match your search or filter.</p>
        </section>


        <!-- Footer -->
        <footer class="footer">
            <p>Group Project Task Manager</p>
        </footer>

    </div>

    <script src="app.js"></script>

</body>
</html>
